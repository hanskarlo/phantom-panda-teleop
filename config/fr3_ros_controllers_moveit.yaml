/**:
  controller_manager:
    ros__parameters:
      update_rate: 1000

      fr3_arm_controller:
        type: joint_trajectory_controller/JointTrajectoryController

      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster

      franka_robot_state_broadcaster:
        type: franka_robot_state_broadcaster/FrankaRobotStateBroadcaster

/**:
  franka_robot_state_broadcaster:
    ros__parameters:
      lock_try_count: 5
      lock_sleep_interval: 5
      lock_log_error: false
      lock_update_success: true

/**:
  fr3_arm_controller:
    ros__parameters:
      command_interfaces:
        - effort
      state_interfaces:
        - position
        - velocity
      joints:
        - fr3_joint1
        - fr3_joint2
        - fr3_joint3
        - fr3_joint4
        - fr3_joint5
        - fr3_joint6
        - fr3_joint7
      gains:
        fr3_joint1: {p: 600.0, d: 30.0, i: 0.0, i_clamp: 1.0}
        fr3_joint2: {p: 600.0, d: 30.0, i: 0.0, i_clamp: 1.0}
        fr3_joint3: {p: 600.0, d: 30.0, i: 0.0, i_clamp: 1.0}
        fr3_joint4: {p: 600.0, d: 30.0, i: 0.0, i_clamp: 1.0}
        fr3_joint5: {p: 250.0, d: 10.0, i: 0.0, i_clamp: 1.0}
        fr3_joint6: {p: 150.0, d: 10.0, i: 0.0, i_clamp: 1.0}
        fr3_joint7: {p: 50.0, d: 5.0, i: 0.0, i_clamp: 1.0}

