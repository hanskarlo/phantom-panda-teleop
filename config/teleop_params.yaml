/phantom_panda_teleop_node:
  ros__parameters:
    update_rate: 200.0
    haptic_base_frame: "touch_x_base"
    haptic_ee_frame: "touch_x_ee"
    robot_base_frame: "fr3_link0"
    robot_ee_frame: "fr3_link8"
    robot_tool_tip_frame: "biorob_tool_tip"
    # Position-only Cartesian haptic-to-tool-tip mapping. Haptic orientation is ignored.
    tip_position_scale: 0.2
    max_tilt_angle: 0.52
    # Blend shaft direction over the first 20 mm to avoid an orientation step at r=0.
    tip_direction_transition_depth: 0.02
    deadband_position: 0.0005
    cutoff_freq: 5.0
    rcm_x: 0.4
    rcm_y: 0.0
    rcm_z: 0.2
    tool_length: 0.25
    min_insertion_depth: 0.0
    max_insertion_depth: 0.23
    # Circumferential shaft mark placed 80 mm proximal from the distal tool tip.
    registration_insertion_depth: 0.08
    # Trocar aperture is a 30 mm circle in a plane parallel to link0 XY.
    rcm_hole_diameter: 0.03
    shaft_marker_extension: 0.15
    rcm_warning_error: 0.002
    # Reject teleoperation if calibration already leaves the shaft off-axis.
    rcm_activation_max_error: 0.0015
    # Freeze before a measured shaft miss can load the trocar boundary.
    rcm_halt_error: 0.004
    # Proportional recovery of a small measured RCM miss [1/s].
    rcm_correction_gain: 3.0
    # Placeholder output for the future custom tool: false=open, true=closed.
    custom_tool_state_topic: "/phantom_panda_teleop_node/custom_tool_closed"
    use_rcm: true
    k_linear: 0.2
    robot_state_timeout: 0.10
    command_chain_timeout: 0.25
    joy_topic: "/geomagic_touch_x/joy"
    joint_state_topic: "/franka/joint_states"
    servo_twist_topic: "/servo_node/delta_twist_cmds"
    servo_status_topic: "/servo_node/status"
    servo_start_service: "/servo_node/start_servo"
    servo_joint_command_topic: "/servo_node/joint_trajectory_raw"
    controller_state_topic: "/fr3_arm_controller/controller_state"
    # Registration positioning is selected by the top-level launch file.
    # fixed: capture current pose; haptic_jog: slow free Cartesian positioning;
    # physical_guiding: optional controller release/restore fallback.
    positioning_mode: "fixed"
    start_in_registration: false
    auto_register_rcm: false
    controller_switch_service: "/controller_manager/switch_controller"
    arm_controller_name: "fr3_arm_controller"
    positioning_max_linear_vel: 0.01
    positioning_max_angular_vel: 0.05
    registration_joint_velocity_tolerance: 0.01
    registration_settle_time: 0.5
    # Independent measured-speed guard above the velocity bridge's command limits.
    joint_velocity_halt_limits: [0.22, 0.22, 0.22, 0.22, 0.33, 0.33, 0.33]
    kp_pos: 3.5
    kp_rot: 2.5
    max_linear_vel: 0.05
    max_angular_vel: 0.2
    max_linear_accel: 0.15
    max_angular_accel: 0.6
    max_linear_jerk: 1.0
    max_angular_jerk: 4.0
    maximize_collision_thresholds: false
