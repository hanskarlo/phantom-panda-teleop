/**: 
  controller_manager:
    ros__parameters:
      update_rate: 1000  # Hz

      fr3_arm_controller:
        type: phantom_panda_teleop/RealtimeServoVelocityController

      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster

      franka_robot_state_broadcaster:
        type: franka_robot_state_broadcaster/FrankaRobotStateBroadcaster

/**:
  franka_robot_state_broadcaster:
    ros__parameters:
      lock_try_count: 5 # Number of attempts to acquire the lock in a single on_update()
      lock_sleep_interval: 5 # microseconds sleep between attempts
      lock_log_error: false #  Log error if lock acquisition fails - false == do not log  
      lock_update_success: true # return update OK, although lock fails (no update occurs)
      
/**: 
  fr3_arm_controller:
    ros__parameters:
      joints:
        - fr3_joint1
        - fr3_joint2
        - fr3_joint3
        - fr3_joint4
        - fr3_joint5
        - fr3_joint6
        - fr3_joint7
      # The Servo bridge publishes at 100 Hz, while Franka consumes velocity at
      # 1 kHz. Apply the final limits in the real-time controller so each 1 ms
      # hardware command is continuous; a message-level limiter alone produces
      # a staircase that can trip libfranka's acceleration-discontinuity reflex.
      command_timeout: 0.05
      state_publish_rate: 50.0
      max_joint_velocity: [0.20, 0.20, 0.20, 0.20, 0.30, 0.30, 0.30]
      max_joint_acceleration: [0.50, 0.50, 0.50, 0.50, 1.00, 1.00, 1.00]
      max_joint_jerk: [500.0, 500.0, 500.0, 500.0, 1000.0, 1000.0, 1000.0]
